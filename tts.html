<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-Speech Reader (英語読み上げ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #e0e7ff;
            border-radius: 4px;
        }
        input[type=range]:focus {
            outline: none;
        }

        .playing-bar {
            animation: bounce 1s infinite ease-in-out alternate;
        }
        .playing-bar:nth-child(2) { animation-delay: 0.2s; }
        .playing-bar:nth-child(3) { animation-delay: 0.4s; }
        .playing-bar:nth-child(4) { animation-delay: 0.6s; }

        @keyframes bounce {
            0% { transform: scaleY(0.3); }
            100% { transform: scaleY(1); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-gray-800">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">
                <i class="fas fa-headphones-alt mr-2"></i>Audio Reader
            </h1>
            <p class="text-gray-500">入力した英文をネイティブ音声で読み上げます</p>
        </div>

        <div class="mb-6">
            <label for="text-input" class="block text-sm font-bold text-gray-700 mb-2">読み上げる英文</label>
            <textarea id="text-input" rows="8" 
                class="w-full p-4 border border-gray-300 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 transition-all resize-y text-gray-800 leading-relaxed text-lg selection:bg-indigo-200 selection:text-indigo-900" 
                placeholder="ここに読み上げたい英文を入力してください..."></textarea>
        </div>

        <div class="bg-slate-100 rounded-xl p-6 mb-4 border border-slate-200 shadow-inner">
            <div class="mb-8">
                <div class="flex justify-between items-center mb-3">
                    <label for="speed-slider" class="text-sm font-bold text-gray-700 flex items-center gap-2">
                        <i class="fas fa-tachometer-alt text-indigo-500"></i> 再生速度
                    </label>
                    <div class="text-xl font-black text-indigo-600 w-16 text-right" id="speed-value">1.0x</div>
                </div>
                <div class="flex items-center gap-4">
                    <i class="fas fa-turtle text-slate-400 text-lg"></i>
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0" class="flex-grow">
                    <i class="fas fa-rabbit text-slate-400 text-lg"></i>
                </div>
                <div class="flex justify-between text-xs font-medium text-slate-400 mt-2 px-6">
                    <span>0.5x (遅い)</span>
                    <span>1.0x (標準)</span>
                    <span>2.0x (速い)</span>
                </div>
            </div>

            <div id="animation-area" class="h-12 flex items-center justify-center gap-2 mb-6 opacity-0 transition-opacity duration-300">
                <div class="flex gap-1 items-center">
                    <div class="w-2 h-8 bg-indigo-500 rounded-full playing-bar"></div>
                    <div class="w-2 h-12 bg-indigo-500 rounded-full playing-bar"></div>
                    <div class="w-2 h-6 bg-indigo-500 rounded-full playing-bar"></div>
                    <div class="w-2 h-10 bg-indigo-500 rounded-full playing-bar"></div>
                </div>
                <span id="playing-status" class="ml-2 text-sm font-bold text-indigo-600 tracking-widest uppercase">Playing...</span>
            </div>

            <div class="flex flex-wrap justify-center items-center gap-3 sm:gap-4">
                <button id="play-btn" class="w-16 h-16 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full shadow-lg hover:shadow-xl transition-all flex items-center justify-center text-2xl transform hover:scale-105">
                    <i class="fas fa-play ml-1"></i>
                </button>
                <button id="pause-btn" class="w-16 h-16 bg-amber-500 hover:bg-amber-600 text-white rounded-full shadow-lg hover:shadow-xl transition-all flex items-center justify-center text-2xl transform hover:scale-105 disabled:opacity-50 disabled:hover:scale-100" disabled>
                    <i class="fas fa-pause"></i>
                </button>
                <button id="stop-btn" class="w-16 h-16 bg-rose-500 hover:bg-rose-600 text-white rounded-full shadow-lg hover:shadow-xl transition-all flex items-center justify-center text-2xl transform hover:scale-105 disabled:opacity-50 disabled:hover:scale-100" disabled>
                    <i class="fas fa-stop"></i>
                </button>
                <button id="repeat-btn" class="w-14 h-14 bg-white border-2 border-slate-200 text-slate-400 hover:text-indigo-500 hover:border-indigo-300 rounded-full shadow-sm transition-all flex items-center justify-center text-xl ml-2 sm:ml-4" title="リピート再生 (オン/オフ)">
                    <i class="fas fa-redo-alt"></i>
                </button>
            </div>
        </div>

        <div class="mt-4 bg-indigo-50 rounded-lg p-4 text-sm text-slate-600 border border-indigo-100 flex items-start gap-3">
            <i class="fas fa-lightbulb text-indigo-400 mt-1"></i>
            <div class="space-y-2">
                <p><strong>部分読み上げ:</strong> 文章の一部を選択（ハイライト）してから再生ボタンを押すと、その範囲だけを読み上げます。</p>
                <p><strong>リピート機能:</strong> 右端の矢印ボタンをオンにすると繰り返し再生します（選択範囲にも適用されます）。</p>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stopBtn = document.getElementById('stop-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const animationArea = document.getElementById('animation-area');
        const playingStatus = document.getElementById('playing-status');

        const synth = window.speechSynthesis;
        let utterance = null;
        let isRepeating = false;
        let isIntentionalStop = false;
        let lastPlayedText = "";

        const sampleText = `Ken is a young student. He wants to study English today. But, he has a big problem. His room is very messy. His desk is too cluttered with many things. He sees a big pile of old homework, comics, and clothes on the right. Because of this mess, he cannot concentrate on his school work.\n\nMany toys and video games are on the desk, too. They are a big distraction for him. He looks at his desk and says, "I must tidy up my room right now."\n\nFirst, he puts his toys in a large box. Then, he needs to organize his papers and pencils. He puts his pens in a small pen case and throws away old papers.\n\nKen has a very good reference book for his English test. He puts the book on the clean desk. Now, the desk is beautiful and quiet. There are no toys on it. Ken is very happy.\n\nHe sits on his chair and opens his book. Now he can read and write very well. A clean workspace makes him very productive. He finishes his study fast and goes out to play.`;
        textInput.value = sampleText;

        let voices = [];
        const populateVoiceList = () => {
            voices = synth.getVoices();
        };
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        speedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value).toFixed(1);
            speedValue.textContent = val + 'x';
        });

        repeatBtn.addEventListener('click', () => {
            isRepeating = !isRepeating;
            if (isRepeating) {
                repeatBtn.classList.replace('border-slate-200', 'border-indigo-400');
                repeatBtn.classList.replace('text-slate-400', 'text-indigo-600');
                repeatBtn.classList.add('bg-indigo-50');
                repeatBtn.classList.remove('bg-white');
            } else {
                repeatBtn.classList.replace('border-indigo-400', 'border-slate-200');
                repeatBtn.classList.replace('text-indigo-600', 'text-slate-400');
                repeatBtn.classList.add('bg-white');
                repeatBtn.classList.remove('bg-indigo-50');
            }
        });

        function updateUI(state) {
            if (state === 'playing') {
                playBtn.classList.replace('bg-indigo-600', 'bg-slate-300');
                playBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-slate-400');
                playBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
                textInput.readOnly = true;
                textInput.classList.add('bg-slate-50', 'text-slate-500');
                animationArea.classList.replace('opacity-0', 'opacity-100');
            } else if (state === 'paused') {
                playBtn.classList.replace('bg-slate-300', 'bg-indigo-600');
                playBtn.classList.replace('hover:bg-slate-400', 'hover:bg-indigo-700');
                playBtn.innerHTML = '<i class="fas fa-play ml-1"></i>';
                pauseBtn.disabled = true;
                stopBtn.disabled = false;
                animationArea.classList.replace('opacity-100', 'opacity-0');
            } else if (state === 'stopped') {
                playBtn.classList.replace('bg-slate-300', 'bg-indigo-600');
                playBtn.classList.replace('hover:bg-slate-400', 'hover:bg-indigo-700');
                playBtn.innerHTML = '<i class="fas fa-play ml-1"></i>';
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
                textInput.readOnly = false;
                textInput.classList.remove('bg-slate-50', 'text-slate-500');
                animationArea.classList.replace('opacity-100', 'opacity-0');
            }
        }

        function startSpeaking(textToRead) {
            if (!textToRead) {
                alert("読み上げるテキストが見つかりません。");
                return;
            }

            synth.cancel();
            isIntentionalStop = false; 

            utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.rate = parseFloat(speedSlider.value); 
            utterance.lang = 'en-US'; 

            if (voices.length > 0) {
                const englishVoice = voices.find(voice => voice.lang === 'en-US' || voice.lang === 'en-GB');
                if (englishVoice) {
                    utterance.voice = englishVoice;
                }
            }

            utterance.onend = () => {
                if (isRepeating && !isIntentionalStop) {
                    setTimeout(() => {
                        if (isRepeating && !isIntentionalStop) {
                            startSpeaking(lastPlayedText);
                        } else {
                            updateUI('stopped');
                        }
                    }, 500);
                } else {
                    updateUI('stopped');
                }
            };

            utterance.onerror = (event) => {
                if(event.error !== 'canceled') {
                    console.error('SpeechSynthesisUtterance.onerror', event);
                    updateUI('stopped');
                }
            };

            synth.speak(utterance);
            updateUI('playing');
        }

        playBtn.addEventListener('click', () => {
            if (synth.paused) {
                synth.resume();
                updateUI('playing');
                return;
            }

            const selectedText = textInput.value.substring(textInput.selectionStart, textInput.selectionEnd).trim();
            const fullText = textInput.value.trim();
            const textToPlay = selectedText || fullText;

            if (!textToPlay) {
                alert("読み上げるテキストを入力してください。");
                return;
            }

            if (selectedText) {
                playingStatus.textContent = "Playing Selection...";
            } else {
                playingStatus.textContent = "Playing...";
            }

            lastPlayedText = textToPlay;
            startSpeaking(textToPlay);
        });

        pauseBtn.addEventListener('click', () => {
            if (synth.speaking && !synth.paused) {
                synth.pause();
                updateUI('paused');
            }
        });

        stopBtn.addEventListener('click', () => {
            isIntentionalStop = true;
            synth.cancel();
            updateUI('stopped');
        });

        window.addEventListener('beforeunload', () => {
            synth.cancel();
        });
    </script>
</body>
</html>
