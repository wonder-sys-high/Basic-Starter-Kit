<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<script>
        const correctPassword = "neko"; // ★ここに好きなパスワードを設定（半角英数字）
        const noteArticleUrl = "https://note.com/hiro_king_oo"; // ★パスワードを間違えた時に飛ばすNote記事のURL

        let userPassword = sessionStorage.getItem("app_auth");
        if (userPassword !== correctPassword) {
            let input = prompt("記事の購入者専用アプリです。\nパスワードを入力してください:");
            if (input === correctPassword) {
                sessionStorage.setItem("app_auth", correctPassword);
            } else {
                alert("パスワードが違います。記事のページに戻ります。");
                window.location.href = noteArticleUrl;
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-gray-800">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-12 mt-8">
            <h1 class="text-4xl font-extrabold text-indigo-600 mb-4">
                English Learning Toolkit
            </h1>
            <p class="text-gray-500 text-lg">用途に合わせてツールを選択してください</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <a href="wpm.html" class="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition-all transform hover:-translate-y-1 border border-transparent hover:border-indigo-200 block group">
                <div class="w-14 h-14 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 text-2xl mb-4 group-hover:scale-110 transition-transform">
                    <i class="fas fa-bolt"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">WPM Tracker</h2>
                <p class="text-gray-500 text-sm">英文の読解スピード（Words Per Minute）を計測し、読むスピードを可視化します。</p>
            </a>

            <a href="tts.html" class="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition-all transform hover:-translate-y-1 border border-transparent hover:border-indigo-200 block group">
                <div class="w-14 h-14 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600 text-2xl mb-4 group-hover:scale-110 transition-transform">
                    <i class="fas fa-headphones-alt"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">Audio Reader</h2>
                <p class="text-gray-500 text-sm">入力した英文をネイティブ音声で読み上げます。リスニングやシャドーイングに最適です。</p>
            </a>

            <a href="speech.html" class="bg-white rounded-2xl shadow-lg p-6 hover:shadow-xl transition-all transform hover:-translate-y-1 border border-transparent hover:border-indigo-200 block group">
                <div class="w-14 h-14 bg-rose-100 rounded-xl flex items-center justify-center text-rose-600 text-2xl mb-4 group-hover:scale-110 transition-transform">
                    <i class="fas fa-microphone-alt"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">1-Min Speech</h2>
                <p class="text-gray-500 text-sm">1分間のスピーチを録音し、文字起こしで内容を確認・振り返りができます。</p>
            </a>
        </div>
    </div>
</body>
</html>
